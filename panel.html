<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Админ панел | Little Achievers</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6fb;
      margin: 0;
      padding: 24px;
      color: #202124;
    }

    .container {
      max-width: 1180px;
      margin: auto;
    }

    .hidden {
      display: none !important;
    }

    .login,
    .top,
    .stats,
    .card {
      background: white;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 3px 12px rgba(0,0,0,0.08);
      margin-bottom: 18px;
    }

    h1 {
      color: #512da8;
      margin-top: 0;
    }

    input,
    textarea {
      width: 100%;
      box-sizing: border-box;
      padding: 11px;
      border-radius: 8px;
      border: 1px solid #dadce0;
      font-size: 15px;
      font-family: Arial, sans-serif;
    }

    textarea {
      min-height: 85px;
      resize: vertical;
    }

    button,
    a.btn {
      background: #673ab7;
      color: white;
      border: none;
      border-radius: 9px;
      padding: 10px 14px;
      font-weight: bold;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      margin-top: 8px;
      margin-right: 6px;
    }

    button:hover,
    a.btn:hover {
      background: #512da8;
    }

    .secondary {
      background: white;
      color: #673ab7;
      border: 2px solid #673ab7;
    }

    .secondary:hover {
      background: #f4edff;
    }

    .danger {
      background: #b3261e;
    }

    .danger:hover {
      background: #8c1d18;
    }

    .green {
      background: #0f9d58;
    }

    .green:hover {
      background: #0b7f45;
    }

    .blue {
      background: #1a73e8;
    }

    .blue:hover {
      background: #1558b0;
    }

    .top-row {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    .search {
      margin-top: 14px;
    }

    .tabs {
      margin-top: 14px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .tab-active {
      background: #512da8 !important;
      color: white !important;
    }

    .card h2 {
      margin: 0 0 8px;
      color: #512da8;
    }

    .card.new-card {
      border: 3px solid #34a853;
      box-shadow: 0 0 0 4px rgba(52,168,83,0.12);
    }

    .card.question-card {
      border: 3px solid #1a73e8;
      box-shadow: 0 0 0 4px rgba(26,115,232,0.12);
    }

    .badges {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin: 8px 0 12px;
    }

    .badge {
      display: inline-block;
      padding: 7px 12px;
      border-radius: 999px;
      font-weight: bold;
      font-size: 13px;
    }

    .badge-code {
      background: #f3edff;
      color: #512da8;
      letter-spacing: 2px;
    }

    .badge-new {
      background: #e6f4ea;
      color: #137333;
    }

    .badge-question {
      background: #e8f0fe;
      color: #174ea6;
    }

    .badge-trash {
      background: #fce8e6;
      color: #b3261e;
    }

    .section-title {
      font-weight: bold;
      margin-top: 18px;
      margin-bottom: 8px;
      border-top: 1px solid #eee;
      padding-top: 14px;
    }

    .item {
      margin: 7px 0;
      line-height: 1.45;
    }

    .label {
      font-weight: bold;
    }

    .notes {
      background: #fafafa;
      padding: 12px;
      border-radius: 10px;
      margin-top: 10px;
    }

    .note,
    .parent-message {
      border-left: 4px solid #673ab7;
      padding: 10px;
      margin-bottom: 10px;
      background: white;
      border-radius: 8px;
    }

    .parent-message.unanswered {
      border-left-color: #1a73e8;
      background: #f3f8ff;
    }

    .small {
      color: #666;
      font-size: 13px;
    }

    .save-ok {
      color: green;
      font-weight: bold;
      margin-left: 10px;
    }

    .x-btn {
      background: #b3261e;
      color: white;
      border-radius: 50%;
      width: 34px;
      height: 34px;
      padding: 0;
      line-height: 34px;
      text-align: center;
      font-size: 18px;
      float: right;
      margin: 0 0 8px 8px;
    }

    .x-btn:hover {
      background: #8c1d18;
    }

    @media print {
      .top,
      .login,
      .admin-actions,
      .x-btn {
        display: none !important;
      }

      body {
        background: white;
      }

      .card {
        box-shadow: none;
        border: 1px solid #ddd;
        page-break-inside: avoid;
      }
    }
  </style>
</head>

<body>
  <div class="container">

    <div id="loginBox" class="login">
      <h1>Админ панел</h1>
      <p>Въведете парола за достъп:</p>
      <input type="password" id="passwordInput" placeholder="Парола">
      <button onclick="checkPassword()">Вход</button>
      <a class="btn secondary" href="./index.html">Начална страница</a>
    </div>

    <div id="adminBox" class="hidden">
      <div class="top">
        <div class="top-row">
          <div>
            <h1>Записани деца | Little Achievers</h1>
            <div>Нови записи до 48 часа светят в зелено. Родителски въпроси без отговор светят в синьо.</div>
          </div>

          <div>
            <a class="btn secondary" href="./index.html">Начало</a>
            <a class="btn secondary" href="./form.html">+ Нова форма</a>
            <button onclick="window.print()">Принтирай / PDF</button>
            <button class="danger" onclick="logout()">Изход</button>
          </div>
        </div>

        <div class="tabs">
          <button id="activeTab" class="tab-active" onclick="setViewMode('active')">Активни деца</button>
          <button id="trashTab" class="secondary" onclick="setViewMode('trash')">Кошче</button>
        </div>

        <div class="search">
          <input id="searchInput" type="text" placeholder="Търси по име, родител, телефон, имейл, код...">
        </div>
      </div>

      <div class="stats" id="stats">Зареждане...</div>

      <div id="childrenList">Зареждане...</div>
    </div>

  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getFirestore,
      collection,
      getDocs,
      query,
      orderBy,
      doc,
      updateDoc,
      deleteDoc,
      arrayUnion,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCoXPhysPJEfeTOFnJUK3ZHR0x66up3L6E",
      authDomain: "littleachievers.firebaseapp.com",
      projectId: "littleachievers",
      storageBucket: "littleachievers.firebasestorage.app",
      messagingSenderId: "811415959587",
      appId: "1:811415959587:web:b6c9911ba8e416ab685996",
      measurementId: "G-YLDS0L7EMF"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const loginBox = document.getElementById("loginBox");
    const adminBox = document.getElementById("adminBox");
    const childrenList = document.getElementById("childrenList");
    const stats = document.getElementById("stats");
    const searchInput = document.getElementById("searchInput");
    const activeTab = document.getElementById("activeTab");
    const trashTab = document.getElementById("trashTab");

    let allChildren = [];
    let viewMode = "active";

    window.checkPassword = function() {
      const password = document.getElementById("passwordInput").value;

      if (password === "00000") {
        sessionStorage.setItem("adminAccess", "yes");
        showAdmin();
      } else {
        alert("Грешна парола!");
      }
    }

    window.logout = function() {
      sessionStorage.removeItem("adminAccess");
      location.reload();
    }

    window.setViewMode = function(mode) {
      viewMode = mode;

      if (viewMode === "active") {
        activeTab.className = "tab-active";
        trashTab.className = "secondary";
      } else {
        activeTab.className = "secondary";
        trashTab.className = "tab-active";
      }

      renderCurrentView();
    }

    function showAdmin() {
      loginBox.classList.add("hidden");
      adminBox.classList.remove("hidden");
      loadChildren();
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function safeText(value) {
      if (Array.isArray(value)) {
        return value.length ? escapeHtml(value.join(", ")) : "Няма информация";
      }

      return value && value.toString().trim() !== "" ? escapeHtml(value) : "Няма информация";
    }

    function formatDate(timestamp) {
      if (!timestamp || !timestamp.toDate) {
        return "Няма дата";
      }

      return timestamp.toDate().toLocaleString("bg-BG", {
        day: "2-digit",
        month: "2-digit",
        year: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function noteDate() {
      return new Date().toLocaleString("bg-BG", {
        day: "2-digit",
        month: "2-digit",
        year: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function isNewChild(child) {
      if (!child.createdAt || !child.createdAt.toDate) {
        return false;
      }

      const created = child.createdAt.toDate().getTime();
      const now = Date.now();
      const hours48 = 48 * 60 * 60 * 1000;

      return now - created <= hours48;
    }

    function hasUnansweredQuestion(child) {
      const messages = Array.isArray(child.parentMessages) ? child.parentMessages : [];
      return messages.some(m => m.text && !m.answer);
    }

    function isDeleted(child) {
      return !!child.deletedAt;
    }

    async function loadChildren() {
      childrenList.textContent = "Зареждане...";

      const q = query(collection(db, "children"), orderBy("createdAt", "desc"));
      const snapshot = await getDocs(q);

      allChildren = [];

      snapshot.forEach((docSnap) => {
        allChildren.push({
          id: docSnap.id,
          ...docSnap.data()
        });
      });

      renderCurrentView();
    }

    function renderCurrentView() {
      const text = searchInput.value.toLowerCase().trim();

      const active = allChildren.filter(child => !isDeleted(child));
      const trash = allChildren.filter(child => isDeleted(child));

      let baseList = viewMode === "active" ? active : trash;

      const filtered = baseList.filter(child => {
        return (
          (child.childName || "").toLowerCase().includes(text) ||
          (child.parentName || "").toLowerCase().includes(text) ||
          (child.phone || "").toLowerCase().includes(text) ||
          (child.email || "").toLowerCase().includes(text) ||
          (child.childCode || "").toLowerCase().includes(text)
        );
      });

      stats.innerHTML = `
        Активни деца: <b>${active.length}</b> |
        В кошче: <b>${trash.length}</b> |
        Показани: <b>${filtered.length}</b>
      `;

      renderChildren(filtered);
    }

    function renderChildren(children) {
      childrenList.innerHTML = "";

      if (!children.length) {
        childrenList.innerHTML = "<div class='card'>Няма намерени записи.</div>";
        return;
      }

      children.forEach((child, index) => {
        const card = document.createElement("div");

        const childIsNew = isNewChild(child);
        const childHasQuestion = hasUnansweredQuestion(child);
        const childDeleted = isDeleted(child);

        let classes = "card";

        if (!childDeleted && childIsNew) {
          classes += " new-card";
        }

        if (!childDeleted && childHasQuestion) {
          classes += " question-card";
        }

        card.className = classes;

        const notes = Array.isArray(child.adminNotes) ? child.adminNotes : [];
        const parentMessages = Array.isArray(child.parentMessages) ? child.parentMessages : [];

        card.innerHTML = `
          ${
            childDeleted
              ? ""
              : `<button class="x-btn" title="Премести в кошче" onclick="moveToTrash('${child.id}')">×</button>`
          }

          <h2>${index + 1}. ${safeText(child.childName)}</h2>

          <div class="badges">
            <span class="badge badge-code">Код: ${safeText(child.childCode)}</span>
            ${childIsNew && !childDeleted ? `<span class="badge badge-new">НОВО до 48 часа</span>` : ""}
            ${childHasQuestion && !childDeleted ? `<span class="badge badge-question">ИМА ВЪПРОС ОТ РОДИТЕЛ</span>` : ""}
            ${childDeleted ? `<span class="badge badge-trash">В КОШЧЕ</span>` : ""}
          </div>

          <div class="small">Записано на: ${formatDate(child.createdAt)}</div>
          ${childDeleted ? `<div class="small">Изтрито на: ${formatDate(child.deletedAt)}</div>` : ""}

          <div class="section-title">Данни за детето</div>
          <div class="item"><span class="label">Име:</span> ${safeText(child.childName)}</div>
          <div class="item"><span class="label">Дата на раждане:</span> ${safeText(child.birthDate)}</div>
          <div class="item"><span class="label">Училище и клас:</span> ${safeText(child.schoolAndClass)}</div>
          <div class="item"><span class="label">Алергии / специфични нужди:</span> ${safeText(child.allergiesNeeds)}</div>

          <div class="section-title">Данни за родител</div>
          <div class="item"><span class="label">Родител:</span> ${safeText(child.parentName)}</div>
          <div class="item"><span class="label">Месторабота:</span> ${safeText(child.parentWorkplace)}</div>
          <div class="item"><span class="label">Телефон:</span> ${safeText(child.phone)}</div>
          <div class="item"><span class="label">Имейл:</span> ${safeText(child.email)}</div>
          <div class="item"><span class="label">Адрес:</span> ${safeText(child.address)}</div>

          <div class="section-title">Участие</div>
          <div class="item"><span class="label">Форма:</span> ${safeText(child.participationForm)}</div>
          <div class="item"><span class="label">Период:</span> ${safeText(child.period)}</div>
          <div class="item"><span class="label">Такса:</span> ${safeText(child.programFee)}</div>
          <div class="item"><span class="label">Допълнителна информация:</span> ${safeText(child.additionalInfo)}</div>

          ${
            childDeleted
              ? `
                <div class="section-title">Кошче</div>
                <button class="green" onclick="restoreChild('${child.id}')">Възстанови</button>
                <button class="danger" onclick="deleteChildForever('${child.id}')">Изтрий окончателно</button>
              `
              : `
                <div class="section-title">Статус към родителя</div>
                <textarea id="status-${child.id}" placeholder="Напиши статус, който родителят да вижда...">${escapeHtml(child.statusText || "")}</textarea>
                <button onclick="saveStatus('${child.id}')">Запомни статус</button>
                <span id="status-ok-${child.id}" class="save-ok"></span>

                <div class="section-title">Нова бележка към това дете</div>
                <textarea id="note-${child.id}" placeholder="Напиши бележка към родителя..."></textarea>
                <button onclick="addNote('${child.id}')">Запомни бележка</button>
                <span id="note-ok-${child.id}" class="save-ok"></span>

                <div class="notes">
                  <b>Запазени бележки:</b>
                  ${
                    notes.length
                    ? notes.map((n, noteIndex) => `
                      <div class="note">
                        <button class="x-btn" title="Изтрий бележката" onclick="deleteNote('${child.id}', ${noteIndex})">×</button>
                        <div>${safeText(n.text)}</div>
                        <div class="small">${safeText(n.date)}</div>
                        <div style="clear:both;"></div>
                      </div>
                    `).join("")
                    : "<div class='small'>Все още няма бележки.</div>"
                  }
                </div>

                <div class="section-title">Въпроси от родителя</div>
                <div class="notes">
                  ${
                    parentMessages.length
                    ? parentMessages.map((m, msgIndex) => `
                      <div class="parent-message ${m.answer ? "" : "unanswered"}">
                        <div><b>Въпрос:</b> ${safeText(m.text)}</div>
                        <div class="small">${safeText(m.date)}</div>

                        <div style="margin-top:10px;"><b>Твоят отговор:</b></div>
                        <textarea id="answer-${child.id}-${msgIndex}" placeholder="Напиши отговор към родителя...">${escapeHtml(m.answer || "")}</textarea>
                        <button class="blue" onclick="saveAnswer('${child.id}', ${msgIndex})">Запомни отговор</button>
                        <span id="answer-ok-${child.id}-${msgIndex}" class="save-ok"></span>

                        ${m.answerDate ? `<div class="small">Отговорено на: ${safeText(m.answerDate)}</div>` : ""}
                      </div>
                    `).join("")
                    : "<div class='small'>Няма въпроси от родителя.</div>"
                  }
                </div>

                <div class="admin-actions">
                  <button class="secondary" onclick="copyParentLink('${child.childCode || ""}')">Копирай линк за родителя</button>
                  <button class="danger" onclick="moveToTrash('${child.id}')">Премести детето в кошче</button>
                </div>
              `
          }
        `;

        childrenList.appendChild(card);
      });
    }

    window.addNote = async function(childId) {
      const textarea = document.getElementById("note-" + childId);
      const ok = document.getElementById("note-ok-" + childId);
      const text = textarea.value.trim();

      if (!text) {
        alert("Напиши бележка.");
        return;
      }

      await updateDoc(doc(db, "children", childId), {
        adminNotes: arrayUnion({
          text: text,
          date: noteDate()
        }),
        updatedAt: serverTimestamp()
      });

      ok.textContent = "Запазено!";
      textarea.value = "";

      await loadChildren();
    }

    window.deleteNote = async function(childId, noteIndex) {
      if (!confirm("Сигурна ли си, че искаш да изтриеш тази бележка?")) {
        return;
      }

      const child = allChildren.find(c => c.id === childId);
      const notes = Array.isArray(child.adminNotes) ? [...child.adminNotes] : [];

      notes.splice(noteIndex, 1);

      await updateDoc(doc(db, "children", childId), {
        adminNotes: notes,
        updatedAt: serverTimestamp()
      });

      await loadChildren();
    }

    window.saveStatus = async function(childId) {
      const textarea = document.getElementById("status-" + childId);
      const ok = document.getElementById("status-ok-" + childId);

      await updateDoc(doc(db, "children", childId), {
        statusText: textarea.value.trim(),
        updatedAt: serverTimestamp()
      });

      ok.textContent = "Запазено!";
      setTimeout(() => ok.textContent = "", 2000);
    }

    window.saveAnswer = async function(childId, msgIndex) {
      const child = allChildren.find(c => c.id === childId);
      const messages = Array.isArray(child.parentMessages) ? [...child.parentMessages] : [];
      const textarea = document.getElementById("answer-" + childId + "-" + msgIndex);
      const ok = document.getElementById("answer-ok-" + childId + "-" + msgIndex);

      messages[msgIndex] = {
        ...messages[msgIndex],
        answer: textarea.value.trim(),
        answerDate: noteDate()
      };

      await updateDoc(doc(db, "children", childId), {
        parentMessages: messages,
        updatedAt: serverTimestamp()
      });

      ok.textContent = "Запазено!";
      setTimeout(() => ok.textContent = "", 2000);

      await loadChildren();
    }

    window.moveToTrash = async function(childId) {
      if (!confirm("Да преместя ли това дете в кошчето? Може да бъде възстановено.")) {
        return;
      }

      await updateDoc(doc(db, "children", childId), {
        deletedAt: serverTimestamp(),
        updatedAt: serverTimestamp()
      });

      await loadChildren();
    }

    window.restoreChild = async function(childId) {
      await updateDoc(doc(db, "children", childId), {
        deletedAt: null,
        updatedAt: serverTimestamp()
      });

      await loadChildren();
    }

    window.deleteChildForever = async function(childId) {
      if (!confirm("ВНИМАНИЕ: Това ще изтрие детето окончателно от Firebase. Да продължа ли?")) {
        return;
      }

      await deleteDoc(doc(db, "children", childId));
      await loadChildren();
    }

    window.copyParentLink = async function(code) {
      const url = window.location.origin + "/status.html?code=" + encodeURIComponent(code);
      await navigator.clipboard.writeText(url);
      alert("Линкът е копиран: " + url);
    }

    searchInput.addEventListener("input", renderCurrentView);

    if (sessionStorage.getItem("adminAccess") === "yes") {
      showAdmin();
    }
  </script>
</body>
</html>
