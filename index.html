<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Little Achievers | Лятна занималня 2026</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #f5f0ff, #eef4ff);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #202124;
      padding: 20px;
      box-sizing: border-box;
    }

    .home {
      width: 100%;
      max-width: 850px;
      background: white;
      border-radius: 28px;
      padding: 40px 24px;
      text-align: center;
      box-shadow: 0 12px 35px rgba(0,0,0,0.12);
      border-top: 12px solid #673ab7;
    }

    .logo {
      width: 210px;
      height: 210px;
      margin: 0 auto 22px;
      border-radius: 50%;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border: 5px solid #e0d3ff;
      box-shadow: 0 6px 18px rgba(0,0,0,0.12);
    }

    .logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    h1 {
      margin: 10px 0;
      color: #512da8;
      font-size: 36px;
    }

    .subtitle {
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 18px;
    }

    .text {
      max-width: 650px;
      margin: 0 auto 28px;
      font-size: 17px;
      line-height: 1.6;
      color: #444;
    }

    .actions {
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .btn {
      background: #673ab7;
      color: white;
      padding: 15px 26px;
      border-radius: 12px;
      border: none;
      text-decoration: none;
      font-size: 17px;
      font-weight: bold;
      cursor: pointer;
      display: inline-block;
    }

    .btn:hover {
      background: #512da8;
    }

    .btn.secondary {
      background: white;
      color: #673ab7;
      border: 2px solid #673ab7;
    }

    .btn.secondary:hover {
      background: #f4edff;
    }

    .small {
      margin-top: 22px;
      color: #666;
      font-size: 14px;
    }

    @media (max-width: 600px) {
      .home {
        padding: 28px 16px;
      }

      h1 {
        font-size: 28px;
      }

      .logo {
        width: 155px;
        height: 155px;
      }

      .subtitle {
        font-size: 19px;
      }

      .text {
        font-size: 15px;
      }
    }
  </style>
</head>

<body>

  <main class="home">

    <div class="logo">
      <img src="./logo.jpg" alt="Little Achievers Logo">
    </div>

    <h1>Little Achievers</h1>

    <div class="subtitle">
      Лятна занималня 2026
    </div>

    <div class="text">
      Добре дошли! Тук можете да направите предварително записване.
      След изпращане на формуляра ще получите 4-цифрен код, с който ще можете
      да следите бележки и информация за детето.
    </div>

    <div class="actions">
      <a class="btn" href="./form.html">Запиши се</a>
      <a class="btn secondary" href="./status.html">Провери с код</a>
      <button class="btn secondary" onclick="openPanel()">Админ панел</button>
    </div>

    <div class="small">
      Админ панелът е защитен с парола.
    </div>

  </main>

  <script>
    function openPanel() {
      const password = prompt("Въведете парола:");

      if (password === "00000") {
        sessionStorage.setItem("adminAccess", "yes");
        window.location.href = "./panel.html";
      } else if (password !== null) {
        alert("Грешна парола!");
      }
    }
  </script>

</body>
</html>
