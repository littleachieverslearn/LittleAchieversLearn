<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>&#1055;&#1088;&#1086;&#1074;&#1077;&#1088;&#1082;&#1072; &#1089; &#1082;&#1086;&#1076; | Little Achievers</title>

  <style>
    body {
      margin: 0;
      padding: 24px;
      font-family: Arial, sans-serif;
      background: #f4f6fb;
      color: #202124;
    }

    .container {
      max-width: 850px;
      margin: auto;
    }

    .box,
    .card {
      background: white;
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 3px 12px rgba(0,0,0,0.08);
      margin-bottom: 18px;
    }

    .box {
      border-top: 10px solid #673ab7;
      text-align: center;
    }

    h1 {
      color: #512da8;
      margin-top: 0;
    }

    input {
      width: 100%;
      max-width: 260px;
      padding: 14px;
      border: 1px solid #dadce0;
      border-radius: 10px;
      text-align: center;
      font-size: 22px;
      letter-spacing: 5px;
      box-sizing: border-box;
      margin: 10px 0;
    }

    textarea {
      width: 100%;
      box-sizing: border-box;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #dadce0;
      min-height: 90px;
      resize: vertical;
      font-family: Arial, sans-serif;
      font-size: 15px;
    }

    button,
    a.btn {
      background: #673ab7;
      color: white;
      border: none;
      border-radius: 9px;
      padding: 12px 18px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      margin: 6px;
    }

    button:hover,
    a.btn:hover {
      background: #512da8;
    }

    .secondary {
      background: white;
      color: #673ab7;
      border: 2px solid #673ab7;
    }

    .secondary:hover {
      background: #f4edff;
    }

    .blue {
      background: #1a73e8;
    }

    .blue:hover {
      background: #1558b0;
    }

    .code {
      display: inline-block;
      background: #f3edff;
      color: #512da8;
      font-weight: bold;
      padding: 7px 12px;
      border-radius: 999px;
      letter-spacing: 2px;
      margin-bottom: 12px;
    }

    .item {
      margin: 8px 0;
      line-height: 1.45;
    }

    .label {
      font-weight: bold;
    }

    .section-title {
      font-weight: bold;
      margin-top: 18px;
      margin-bottom: 8px;
      border-top: 1px solid #eee;
      padding-top: 14px;
    }

    .note,
    .message {
      border-left: 4px solid #673ab7;
      padding: 10px;
      margin-bottom: 10px;
      background: #fafafa;
      border-radius: 8px;
    }

    .message {
      border-left-color: #1a73e8;
      background: #f3f8ff;
    }

    .small {
      color: #666;
      font-size: 13px;
    }

    .error {
      color: #b3261e;
      font-weight: bold;
    }

    .success {
      color: #137333;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <div class="container">

    <div class="box">
      <h1>&#1055;&#1088;&#1086;&#1074;&#1077;&#1088;&#1082;&#1072; &#1089; 4-&#1094;&#1080;&#1092;&#1088;&#1077;&#1085; &#1082;&#1086;&#1076;</h1>
      <p>&#1042;&#1098;&#1074;&#1077;&#1076;&#1077;&#1090;&#1077; &#1082;&#1086;&#1076;&#1072;, &#1082;&#1086;&#1081;&#1090;&#1086; &#1087;&#1086;&#1083;&#1091;&#1095;&#1080;&#1093;&#1090;&#1077; &#1089;&#1083;&#1077;&#1076; &#1079;&#1072;&#1103;&#1074;&#1082;&#1072;&#1090;&#1072;.</p>

      <input id="codeInput" type="text" maxlength="4" placeholder="0000">

      <br>

      <button onclick="findChild()">&#1055;&#1088;&#1086;&#1074;&#1077;&#1088;&#1080;</button>
      <button class="secondary" onclick="rememberCode()">&#1047;&#1072;&#1087;&#1086;&#1084;&#1085;&#1080;</button>
      <a class="btn secondary" href="./index.html">&#1053;&#1072;&#1095;&#1072;&#1083;&#1086;</a>

      <div id="message"></div>
    </div>

    <div id="result"></div>

  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

    import {
      getFirestore,
      collection,
      getDocs,
      query,
      where,
      doc,
      updateDoc,
      arrayUnion,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    import {
      getMessaging,
      getToken,
      isSupported
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-messaging.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCoXPhysPJEfeTOFnJUK3ZHR0x66up3L6E",
      authDomain: "littleachievers.firebaseapp.com",
      projectId: "littleachievers",
      storageBucket: "littleachievers.firebasestorage.app",
      messagingSenderId: "811415959587",
      appId: "1:811415959587:web:b6c9911ba8e416ab685996",
      measurementId: "G-YLDS0L7EMF"
    };

    const vapidKey = "BNpyVpBvIkOYyPOo7i2UbMolAkMxpgzBVs1deLgYBt2BH5D2HYrE3kOVH7TJSI3Oeh3fqSU9lIeMDvQfOYhA8k0";

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const codeInput = document.getElementById("codeInput");
    const result = document.getElementById("result");
    const message = document.getElementById("message");

    let currentChild = null;

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function safeText(value) {
      if (Array.isArray(value)) {
        return value.length ? escapeHtml(value.join(", ")) : "\u041D\u044F\u043C\u0430 \u0438\u043D\u0444\u043E\u0440\u043C\u0430\u0446\u0438\u044F";
      }

      return value && value.toString().trim() !== "" ? escapeHtml(value) : "\u041D\u044F\u043C\u0430 \u0438\u043D\u0444\u043E\u0440\u043C\u0430\u0446\u0438\u044F";
    }

    function getCodeFromUrl() {
      const params = new URLSearchParams(window.location.search);
      return params.get("code");
    }

    function noteDate() {
      return new Date().toLocaleString("bg-BG", {
        day: "2-digit",
        month: "2-digit",
        year: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    window.rememberCode = function() {
      const code = codeInput.value.trim();

      if (code.length === 4) {
        localStorage.setItem("littleAchieversChildCode", code);
        message.innerHTML = "<p class='success'>\u041A\u043E\u0434\u044A\u0442 \u0435 \u0437\u0430\u043F\u043E\u043C\u043D\u0435\u043D \u043D\u0430 \u0442\u043E\u0432\u0430 \u0443\u0441\u0442\u0440\u043E\u0439\u0441\u0442\u0432\u043E.</p>";
      } else {
        message.innerHTML = "<p class='error'>\u0412\u044A\u0432\u0435\u0434\u0435\u0442\u0435 4-\u0446\u0438\u0444\u0440\u0435\u043D \u043A\u043E\u0434.</p>";
      }
    };

    window.findChild = async function() {
      const code = codeInput.value.trim();

      result.innerHTML = "";
      message.innerHTML = "";
      currentChild = null;

      if (code.length !== 4) {
        message.innerHTML = "<p class='error'>\u0412\u044A\u0432\u0435\u0434\u0435\u0442\u0435 4-\u0446\u0438\u0444\u0440\u0435\u043D \u043A\u043E\u0434.</p>";
        return;
      }

      const q = query(collection(db, "children"), where("childCode", "==", code));
      const snapshot = await getDocs(q);

      if (snapshot.empty) {
        result.innerHTML = "<div class='card error'>\u041D\u044F\u043C\u0430 \u043D\u0430\u043C\u0435\u0440\u0435\u043D \u0437\u0430\u043F\u0438\u0441 \u0441 \u0442\u043E\u0437\u0438 \u043A\u043E\u0434.</div>";
        return;
      }

      snapshot.forEach(docSnap => {
        currentChild = {
          id: docSnap.id,
          ...docSnap.data()
        };
      });

      if (currentChild.deletedAt) {
        result.innerHTML = "<div class='card error'>\u0422\u043E\u0437\u0438 \u0437\u0430\u043F\u0438\u0441 \u0432\u0435\u0447\u0435 \u043D\u0435 \u0435 \u0430\u043A\u0442\u0438\u0432\u0435\u043D.</div>";
        return;
      }

      renderChild(currentChild);
      localStorage.setItem("littleAchieversChildCode", code);
    };

    function renderChild(child) {
      const notes = Array.isArray(child.adminNotes) ? child.adminNotes : [];
      const parentMessages = Array.isArray(child.parentMessages) ? child.parentMessages : [];

      result.innerHTML = `
        <div class="card">
          <h1>${safeText(child.childName)}</h1>
          <div class="code">\u041A\u043E\u0434: ${safeText(child.childCode)}</div>

          <div class="section-title">\u0421\u0442\u0430\u0442\u0443\u0441 / \u0441\u044A\u043E\u0431\u0449\u0435\u043D\u0438\u0435</div>
          <div class="item">${safeText(child.statusText)}</div>

          <div class="section-title">\u0418\u0437\u0432\u0435\u0441\u0442\u0438\u044F</div>
          <button class="blue" onclick="enableParentNotifications()">
            \u0420\u0430\u0437\u0440\u0435\u0448\u0438 \u0438\u0437\u0432\u0435\u0441\u0442\u0438\u044F \u0437\u0430 \u0442\u043E\u0432\u0430 \u0434\u0435\u0442\u0435
          </button>
          <div id="parentNotifyStatus" class="small"></div>

          <div class="section-title">\u041E\u0441\u043D\u043E\u0432\u043D\u0430 \u0438\u043D\u0444\u043E\u0440\u043C\u0430\u0446\u0438\u044F</div>
          <div class="item"><span class="label">\u0414\u0435\u0442\u0435:</span> ${safeText(child.childName)}</div>
          <div class="item"><span class="label">\u0424\u043E\u0440\u043C\u0430:</span> ${safeText(child.participationForm)}</div>
          <div class="item"><span class="label">\u041F\u0435\u0440\u0438\u043E\u0434:</span> ${safeText(child.period)}</div>
          <div class="item"><span class="label">\u0422\u0430\u043A\u0441\u0430:</span> ${safeText(child.programFee)}</div>

          <div class="section-title">\u0411\u0435\u043B\u0435\u0436\u043A\u0438 \u043E\u0442 Little Achievers</div>
          ${
            notes.length
              ? notes.map(n => `
                <div class="note">
                  <div>${safeText(n.text)}</div>
                  ${n.fileUrl ? `<div><a href="${escapeHtml(n.fileUrl)}" target="_blank">\u041E\u0442\u0432\u043E\u0440\u0438 \u043F\u0440\u0438\u043A\u0430\u0447\u0435\u043D \u043B\u0438\u043D\u043A</a></div>` : ""}
                  <div class="small">${safeText(n.date)}</div>
                </div>
              `).join("")
              : "<div class='small'>\u0412\u0441\u0435 \u043E\u0449\u0435 \u043D\u044F\u043C\u0430 \u0434\u043E\u0431\u0430\u0432\u0435\u043D\u0438 \u0431\u0435\u043B\u0435\u0436\u043A\u0438.</div>"
          }

          <div class="section-title">\u0412\u044A\u043F\u0440\u043E\u0441 \u043A\u044A\u043C Little Achievers</div>
          <textarea id="parentQuestion" placeholder="\u041D\u0430\u043F\u0438\u0448\u0435\u0442\u0435 \u0432\u044A\u043F\u0440\u043E\u0441 \u0438\u043B\u0438 \u0441\u044A\u043E\u0431\u0449\u0435\u043D\u0438\u0435 \u043A\u044A\u043C \u043D\u0430\u0441..."></textarea>
          <br>
          <button class="blue" onclick="sendParentQuestion()">\u0418\u0437\u043F\u0440\u0430\u0442\u0438 \u0432\u044A\u043F\u0440\u043E\u0441</button>
          <span id="questionStatus" class="success"></span>

          <div class="section-title">\u041C\u043E\u0438\u0442\u0435 \u0432\u044A\u043F\u0440\u043E\u0441\u0438 \u0438 \u043E\u0442\u0433\u043E\u0432\u043E\u0440\u0438</div>
          ${
            parentMessages.length
              ? parentMessages.map(m => `
                <div class="message">
                  <div><b>\u0412\u044A\u043F\u0440\u043E\u0441:</b> ${safeText(m.text)}</div>
                  <div class="small">${safeText(m.date)}</div>
                  <br>
                  <div><b>\u041E\u0442\u0433\u043E\u0432\u043E\u0440:</b> ${safeText(m.answer || "\u0412\u0441\u0435 \u043E\u0449\u0435 \u043D\u044F\u043C\u0430 \u043E\u0442\u0433\u043E\u0432\u043E\u0440.")}</div>
                  ${m.answerDate ? `<div class="small">\u041E\u0442\u0433\u043E\u0432\u043E\u0440\u0435\u043D\u043E \u043D\u0430: ${safeText(m.answerDate)}</div>` : ""}
                </div>
              `).join("")
              : "<div class='small'>\u0412\u0441\u0435 \u043E\u0449\u0435 \u043D\u044F\u043C\u0430 \u0438\u0437\u043F\u0440\u0430\u0442\u0435\u043D\u0438 \u0432\u044A\u043F\u0440\u043E\u0441\u0438.</div>"
          }
        </div>
      `;
    }

    window.sendParentQuestion = async function() {
      if (!currentChild || !currentChild.id) {
        alert("\u041F\u044A\u0440\u0432\u043E \u0432\u044A\u0432\u0435\u0434\u0435\u0442\u0435 \u0432\u0430\u043B\u0438\u0434\u0435\u043D \u043A\u043E\u0434.");
        return;
      }

      const textarea = document.getElementById("parentQuestion");
      const status = document.getElementById("questionStatus");
      const text = textarea.value.trim();

      if (!text) {
        alert("\u041D\u0430\u043F\u0438\u0448\u0435\u0442\u0435 \u0432\u044A\u043F\u0440\u043E\u0441.");
        return;
      }

      await updateDoc(doc(db, "children", currentChild.id), {
        parentMessages: arrayUnion({
          text: text,
          date: noteDate(),
          answer: "",
          answerDate: ""
        }),
        updatedAt: serverTimestamp()
      });

      try {
        await fetch("/api/send-notification", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            title: "\u041D\u043E\u0432 \u0432\u044A\u043F\u0440\u043E\u0441 \u043E\u0442 \u0440\u043E\u0434\u0438\u0442\u0435\u043B",
            body: `${currentChild.childName || "\u0414\u0435\u0442\u0435"}: ${text}`,
            childName: currentChild.childName || "",
            birthDate: currentChild.birthDate || "",
            childCode: currentChild.childCode || ""
          })
        });
      } catch (notifyError) {
        console.error("Admin notification error:", notifyError);
      }

      textarea.value = "";
      status.textContent = "\u0412\u044A\u043F\u0440\u043E\u0441\u044A\u0442 \u0435 \u0438\u0437\u043F\u0440\u0430\u0442\u0435\u043D.";

      await findChild();
    };

    window.enableParentNotifications = async function() {
      if (!currentChild || !currentChild.id) {
        alert("\u041F\u044A\u0440\u0432\u043E \u0432\u044A\u0432\u0435\u0434\u0435\u0442\u0435 \u0432\u0430\u043B\u0438\u0434\u0435\u043D \u043A\u043E\u0434.");
        return;
      }

      const status = document.getElementById("parentNotifyStatus");

      try {
        if (!("Notification" in window)) {
          status.textContent = "\u0422\u043E\u0437\u0438 \u0431\u0440\u0430\u0443\u0437\u044A\u0440 \u043D\u0435 \u043F\u043E\u0434\u0434\u044A\u0440\u0436\u0430 \u0438\u0437\u0432\u0435\u0441\u0442\u0438\u044F.";
          return;
        }

        if (!("serviceWorker" in navigator)) {
          status.textContent = "\u0422\u043E\u0437\u0438 \u0431\u0440\u0430\u0443\u0437\u044A\u0440 \u043D\u0435 \u043F\u043E\u0434\u0434\u044A\u0440\u0436\u0430 service worker.";
          return;
        }

        const supported = await isSupported();

        if (!supported) {
          status.textContent = "\u0422\u043E\u0437\u0438 \u0431\u0440\u0430\u0443\u0437\u044A\u0440 \u043D\u0435 \u043F\u043E\u0434\u0434\u044A\u0440\u0436\u0430 Firebase push.";
          return;
        }

        const permission = await Notification.requestPermission();

        if (permission !== "granted") {
          status.textContent = "\u0418\u0437\u0432\u0435\u0441\u0442\u0438\u044F\u0442\u0430 \u043D\u0435 \u0441\u0430 \u0440\u0430\u0437\u0440\u0435\u0448\u0435\u043D\u0438.";
          return;
        }

        const registration = await navigator.serviceWorker.register("/firebase-messaging-sw.js", {
          scope: "/"
        });

        const messaging = getMessaging(app);

        const token = await getToken(messaging, {
          vapidKey: vapidKey,
          serviceWorkerRegistration: registration
        });

        if (!token) {
          status.textContent = "\u041D\u0435 \u0431\u0435\u0448\u0435 \u043F\u043E\u043B\u0443\u0447\u0435\u043D notification token.";
          return;
        }

        await updateDoc(doc(db, "children", currentChild.id), {
          parentNotificationTokens: arrayUnion(token),
          updatedAt: serverTimestamp()
        });

        status.textContent = "\u0413\u043E\u0442\u043E\u0432\u043E! \u0429\u0435 \u043F\u043E\u043B\u0443\u0447\u0430\u0432\u0430\u0442\u0435 \u0438\u0437\u0432\u0435\u0441\u0442\u0438\u044F \u0437\u0430 \u0442\u043E\u0432\u0430 \u0434\u0435\u0442\u0435.";
      } catch (error) {
        console.error(error);
        status.textContent = "\u0413\u0440\u0435\u0448\u043A\u0430: " + (error.message || String(error));
      }
    };

    const urlCode = getCodeFromUrl();
    const savedCode = localStorage.getItem("littleAchieversChildCode");

    if (urlCode) {
      codeInput.value = urlCode;
      findChild();
    } else if (savedCode) {
      codeInput.value = savedCode;
    }
  </script>
</body>
</html>
