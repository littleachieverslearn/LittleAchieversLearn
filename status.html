<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>РџСЂРѕРІРµСЂРєР° СЃ РєРѕРґ | Little Achievers</title>

  <style>
    body {
      margin: 0;
      padding: 24px;
      font-family: Arial, sans-serif;
      background: #f4f6fb;
      color: #202124;
    }

    .container {
      max-width: 850px;
      margin: auto;
    }

    .box,
    .card {
      background: white;
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 3px 12px rgba(0,0,0,0.08);
      margin-bottom: 18px;
    }

    .box {
      border-top: 10px solid #673ab7;
      text-align: center;
    }

    h1 {
      color: #512da8;
      margin-top: 0;
    }

    input {
      width: 100%;
      max-width: 260px;
      padding: 14px;
      border: 1px solid #dadce0;
      border-radius: 10px;
      text-align: center;
      font-size: 22px;
      letter-spacing: 5px;
      box-sizing: border-box;
      margin: 10px 0;
    }

    textarea {
      width: 100%;
      box-sizing: border-box;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #dadce0;
      min-height: 90px;
      resize: vertical;
      font-family: Arial, sans-serif;
      font-size: 15px;
    }

    button,
    a.btn {
      background: #673ab7;
      color: white;
      border: none;
      border-radius: 9px;
      padding: 12px 18px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      margin: 6px;
    }

    button:hover,
    a.btn:hover {
      background: #512da8;
    }

    .secondary {
      background: white;
      color: #673ab7;
      border: 2px solid #673ab7;
    }

    .secondary:hover {
      background: #f4edff;
    }

    .blue {
      background: #1a73e8;
    }

    .blue:hover {
      background: #1558b0;
    }

    .code {
      display: inline-block;
      background: #f3edff;
      color: #512da8;
      font-weight: bold;
      padding: 7px 12px;
      border-radius: 999px;
      letter-spacing: 2px;
      margin-bottom: 12px;
    }

    .item {
      margin: 8px 0;
      line-height: 1.45;
    }

    .label {
      font-weight: bold;
    }

    .section-title {
      font-weight: bold;
      margin-top: 18px;
      margin-bottom: 8px;
      border-top: 1px solid #eee;
      padding-top: 14px;
    }

    .note,
    .message {
      border-left: 4px solid #673ab7;
      padding: 10px;
      margin-bottom: 10px;
      background: #fafafa;
      border-radius: 8px;
    }

    .message {
      border-left-color: #1a73e8;
      background: #f3f8ff;
    }

    .small {
      color: #666;
      font-size: 13px;
    }

    .error {
      color: #b3261e;
      font-weight: bold;
    }

    .success {
      color: #137333;
      font-weight: bold;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>
  <div class="container">

    <div class="box">
      <h1>РџСЂРѕРІРµСЂРєР° СЃ 4-С†РёС„СЂРµРЅ РєРѕРґ</h1>
      <p>Р’СЉРІРµРґРµС‚Рµ РєРѕРґР°, РєРѕР№С‚Рѕ РїРѕР»СѓС‡РёС…С‚Рµ СЃР»РµРґ Р·Р°РїРёСЃРІР°РЅРµ.</p>

      <input id="codeInput" type="text" maxlength="4" placeholder="0000">

      <br>

      <button onclick="findChild()">РџСЂРѕРІРµСЂРё</button>
      <button class="secondary" onclick="rememberCode()">Р—Р°РїРѕРјРЅРё</button>
      <a class="btn secondary" href="./index.html">РќР°С‡Р°Р»Рѕ</a>

      <div id="message"></div>
    </div>

    <div id="result"></div>

  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getFirestore,
      collection,
      getDocs,
      query,
      where,
      doc,
      updateDoc,
      arrayUnion,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    import {
      getMessaging,
      getToken,
      isSupported
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-messaging.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCoXPhysPJEfeTOFnJUK3ZHR0x66up3L6E",
      authDomain: "littleachievers.firebaseapp.com",
      projectId: "littleachievers",
      storageBucket: "littleachievers.firebasestorage.app",
      messagingSenderId: "811415959587",
      appId: "1:811415959587:web:b6c9911ba8e416ab685996",
      measurementId: "G-YLDS0L7EMF"
    };

    const vapidKey = "BNpyVpBvIkOYyPOo7i2UbMolAkMxpgzBVs1deLgYBt2BH5D2HYrE3kOVH7TJSI3Oeh3fqSU9lIeMDvQfOYhA8k0";

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const codeInput = document.getElementById("codeInput");
    const result = document.getElementById("result");
    const message = document.getElementById("message");

    let currentChild = null;

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function safeText(value) {
      if (Array.isArray(value)) {
        return value.length ? escapeHtml(value.join(", ")) : "РќСЏРјР° РёРЅС„РѕСЂРјР°С†РёСЏ";
      }

      return value && value.toString().trim() !== "" ? escapeHtml(value) : "РќСЏРјР° РёРЅС„РѕСЂРјР°С†РёСЏ";
    }

    function getCodeFromUrl() {
      const params = new URLSearchParams(window.location.search);
      return params.get("code");
    }

    function noteDate() {
      return new Date().toLocaleString("bg-BG", {
        day: "2-digit",
        month: "2-digit",
        year: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    window.rememberCode = function() {
      const code = codeInput.value.trim();

      if (code.length === 4) {
        localStorage.setItem("littleAchieversChildCode", code);
        message.innerHTML = "<p class='success'>РљРѕРґСЉС‚ Рµ Р·Р°РїРѕРјРЅРµРЅ РЅР° С‚РѕРІР° СѓСЃС‚СЂРѕР№СЃС‚РІРѕ.</p>";
      } else {
        message.innerHTML = "<p class='error'>Р’СЉРІРµРґРµС‚Рµ 4-С†РёС„СЂРµРЅ РєРѕРґ.</p>";
      }
    }

    window.findChild = async function() {
      const code = codeInput.value.trim();

      result.innerHTML = "";
      message.innerHTML = "";
      currentChild = null;

      if (code.length !== 4) {
        message.innerHTML = "<p class='error'>Р’СЉРІРµРґРµС‚Рµ 4-С†РёС„СЂРµРЅ РєРѕРґ.</p>";
        return;
      }

      const q = query(collection(db, "children"), where("childCode", "==", code));
      const snapshot = await getDocs(q);

      if (snapshot.empty) {
        result.innerHTML = "<div class='card error'>РќСЏРјР° РЅР°РјРµСЂРµРЅ Р·Р°РїРёСЃ СЃ С‚РѕР·Рё РєРѕРґ.</div>";
        return;
      }

      snapshot.forEach(docSnap => {
        currentChild = {
          id: docSnap.id,
          ...docSnap.data()
        };
      });

      if (currentChild.deletedAt) {
        result.innerHTML = "<div class='card error'>РўРѕР·Рё Р·Р°РїРёСЃ РІРµС‡Рµ РЅРµ Рµ Р°РєС‚РёРІРµРЅ.</div>";
        return;
      }

      renderChild(currentChild);
      localStorage.setItem("littleAchieversChildCode", code);
    }

    function renderChild(child) {
      const notes = Array.isArray(child.adminNotes) ? child.adminNotes : [];
      const parentMessages = Array.isArray(child.parentMessages) ? child.parentMessages : [];

      result.innerHTML = `
        <div class="card">
          <h1>${safeText(child.childName)}</h1>
          <div class="code">РљРѕРґ: ${safeText(child.childCode)}</div>

          <div class="section-title">РЎС‚Р°С‚СѓСЃ / СЃСЉРѕР±С‰РµРЅРёРµ</div>
          <div class="item">${safeText(child.statusText)}</div>

          <div class="section-title">РР·РІРµСЃС‚РёСЏ</div>
          <button class="blue" onclick="enableParentNotifications()">
            Р Р°Р·СЂРµС€Рё РёР·РІРµСЃС‚РёСЏ Р·Р° С‚РѕРІР° РґРµС‚Рµ
          </button>
          <div id="parentNotifyStatus" class="small"></div>

          <div class="section-title">РћСЃРЅРѕРІРЅР° РёРЅС„РѕСЂРјР°С†РёСЏ</div>
          <div class="item"><span class="label">Р”РµС‚Рµ:</span> ${safeText(child.childName)}</div>
          <div class="item"><span class="label">Р РѕРґРёС‚РµР»:</span> ${safeText(child.parentName)}</div>
          <div class="item"><span class="label">Р¤РѕСЂРјР° РЅР° СѓС‡Р°СЃС‚РёРµ:</span> ${safeText(child.participationForm)}</div>
          <div class="item"><span class="label">РџРµСЂРёРѕРґ:</span> ${safeText(child.period)}</div>
          <div class="item"><span class="label">РўР°РєСЃР°:</span> ${safeText(child.programFee)}</div>

          <div class="section-title">Р‘РµР»РµР¶РєРё РѕС‚ Little Achievers</div>
          ${
            notes.length
              ? notes.map(n => `
                <div class="note">
                  <div>${safeText(n.text)}</div>
                  <div class="small">${safeText(n.date)}</div>
                </div>
              `).join("")
              : "<div class='small'>Р’СЃРµ РѕС‰Рµ РЅСЏРјР° РґРѕР±Р°РІРµРЅРё Р±РµР»РµР¶РєРё.</div>"
          }

          <div class="section-title">Р’СЉРїСЂРѕСЃ РєСЉРј Little Achievers</div>
          <textarea id="parentQuestion" placeholder="РќР°РїРёС€РµС‚Рµ РІСЉРїСЂРѕСЃ РёР»Рё СЃСЉРѕР±С‰РµРЅРёРµ РєСЉРј РЅР°СЃ..."></textarea>
          <br>
          <button class="blue" onclick="sendParentQuestion()">РР·РїСЂР°С‚Рё РІСЉРїСЂРѕСЃ</button>
          <span id="questionStatus" class="success"></span>

          <div class="section-title">РњРѕРёС‚Рµ РІСЉРїСЂРѕСЃРё Рё РѕС‚РіРѕРІРѕСЂРё</div>
          ${
            parentMessages.length
              ? parentMessages.map(m => `
                <div class="message">
                  <div><b>Р’СЉРїСЂРѕСЃ:</b> ${safeText(m.text)}</div>
                  <div class="small">${safeText(m.date)}</div>
                  <br>
                  <div><b>РћС‚РіРѕРІРѕСЂ:</b> ${safeText(m.answer || "Р’СЃРµ РѕС‰Рµ РЅСЏРјР° РѕС‚РіРѕРІРѕСЂ.")}</div>
                  ${m.answerDate ? `<div class="small">РћС‚РіРѕРІРѕСЂРµРЅРѕ РЅР°: ${safeText(m.answerDate)}</div>` : ""}
                </div>
              `).join("")
              : "<div class='small'>Р’СЃРµ РѕС‰Рµ РЅСЏРјР° РёР·РїСЂР°С‚РµРЅРё РІСЉРїСЂРѕСЃРё.</div>"
          }
        </div>
      `;
    }

    window.sendParentQuestion = async function() {
      if (!currentChild || !currentChild.id) {
        alert("РџСЉСЂРІРѕ РІСЉРІРµРґРµС‚Рµ РІР°Р»РёРґРµРЅ РєРѕРґ.");
        return;
      }

      const textarea = document.getElementById("parentQuestion");
      const status = document.getElementById("questionStatus");
      const text = textarea.value.trim();

      if (!text) {
        alert("РќР°РїРёС€РµС‚Рµ РІСЉРїСЂРѕСЃ.");
        return;
      }

      await updateDoc(doc(db, "children", currentChild.id), {
        parentMessages: arrayUnion({
          text: text,
          date: noteDate(),
          answer: "",
          answerDate: ""
        }),
        updatedAt: serverTimestamp()
      });

      try {
        await fetch("/api/send-notification", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            title: "Нов въпрос от родител",
            body: `${currentChild.childName || "Дете"}: ${text}`,
            childName: currentChild.childName || "",
            birthDate: currentChild.birthDate || "",
            childCode: currentChild.childCode || ""
          })
        });
      } catch (notifyError) {
        console.error("Грешка при известие към админ:", notifyError);
      }

      textarea.value = "";
      status.textContent = "Р’СЉРїСЂРѕСЃСЉС‚ Рµ РёР·РїСЂР°С‚РµРЅ.";

      await findChild();
    }

    window.enableParentNotifications = async function() {
      if (!currentChild || !currentChild.id) {
        alert("РџСЉСЂРІРѕ РІСЉРІРµРґРµС‚Рµ РІР°Р»РёРґРµРЅ РєРѕРґ.");
        return;
      }

      const status = document.getElementById("parentNotifyStatus");

      try {
        if (!("Notification" in window)) {
          status.textContent = "РўРѕР·Рё Р±СЂР°СѓР·СЉСЂ РЅРµ РїРѕРґРґСЉСЂР¶Р° РёР·РІРµСЃС‚РёСЏ.";
          return;
        }

        if (!("serviceWorker" in navigator)) {
          status.textContent = "РўРѕР·Рё Р±СЂР°СѓР·СЉСЂ РЅРµ РїРѕРґРґСЉСЂР¶Р° service worker РёР·РІРµСЃС‚РёСЏ.";
          return;
        }

        const supported = await isSupported();

        if (!supported) {
          status.textContent = "РўРѕР·Рё Р±СЂР°СѓР·СЉСЂ РЅРµ РїРѕРґРґСЉСЂР¶Р° Firebase push РёР·РІРµСЃС‚РёСЏ.";
          return;
        }

        const permission = await Notification.requestPermission();

        if (permission !== "granted") {
          status.textContent = "РР·РІРµСЃС‚РёСЏС‚Р° РЅРµ СЃР° СЂР°Р·СЂРµС€РµРЅРё.";
          return;
        }

        const registration = await navigator.serviceWorker.register("/firebase-messaging-sw.js");

        const messaging = getMessaging(app);

        const token = await getToken(messaging, {
          vapidKey: vapidKey,
          serviceWorkerRegistration: registration
        });

        if (!token) {
          status.textContent = "РќРµ Р±РµС€Рµ РїРѕР»СѓС‡РµРЅ notification token.";
          return;
        }

        await updateDoc(doc(db, "children", currentChild.id), {
          parentNotificationTokens: arrayUnion(token),
          updatedAt: serverTimestamp()
        });

        status.textContent = "Р“РѕС‚РѕРІРѕ! Р©Рµ РїРѕР»СѓС‡Р°РІР°С‚Рµ РёР·РІРµСЃС‚РёСЏ Р·Р° С‚РѕРІР° РґРµС‚Рµ.";
      } catch (error) {
        console.error(error);
        status.textContent = "Р“СЂРµС€РєР° РїСЂРё РІРєР»СЋС‡РІР°РЅРµ РЅР° РёР·РІРµСЃС‚РёСЏС‚Р°.";
      }
    };

    const urlCode = getCodeFromUrl();
    const savedCode = localStorage.getItem("littleAchieversChildCode");

    if (urlCode) {
      codeInput.value = urlCode;
      findChild();
    } else if (savedCode) {
      codeInput.value = savedCode;
    }
  </script>
</body>
</html>
